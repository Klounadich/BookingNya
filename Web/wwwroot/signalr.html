<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HotelBookPro | Smart Booking with Filters</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eef4 100%);
            color: #1a2c3e;
            line-height: 1.5;
            min-height: 100vh;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }
        header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(76,175,80,0.2);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }
        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .connection-badge {
            font-size: 0.7rem;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* Filters Panel */
        .filters-panel {
            background: white;
            border-radius: 28px;
            padding: 20px 24px;
            margin: 24px 0 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .filters-title {
            font-weight: 600;
            margin-bottom: 16px;
            color: #1f3b4c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px 20px;
            align-items: end;
        }
        .filter-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .filter-field label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #4f6f7f;
        }
        .filter-field input, .filter-field select {
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.9rem;
            background: #fafcfc;
            transition: 0.15s;
        }
        .filter-field input:focus, .filter-field select:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
            outline: none;
        }
        .amenities-section {
            grid-column: 1 / -1;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px dashed #cddfe7;
        }
        .amenities-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4f6f7f;
            margin-bottom: 12px;
        }
        .amenities-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 24px;
        }
        .amenity-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3b4c;
        }
        .amenity-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: #4caf50;
        }
        .view-select-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }
        .view-select-container label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #4f6f7f;
        }
        .view-select-container select {
            width: auto;
            min-width: 120px;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1.5px solid #e2e8f0;
            background: #fafcfc;
        }
        .filter-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #1f3b4c;
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .rooms-section {
            margin: 0 0 40px;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .refresh-btn {
            background: #eef2ff;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            color: #1e4a6b;
        }
        .refresh-btn:hover {
            background: #e2e8f0;
            transform: scale(0.97);
        }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .room-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.1);
            transition: all 0.25s ease;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .room-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }
        .room-img-placeholder {
            background: linear-gradient(135deg, #cfdee9, #bdd4e2);
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #2c5a6e;
        }
        .room-info {
            padding: 20px;
        }
        .room-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .room-type {
            font-size: 0.8rem;
            color: #4caf50;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .room-details {
            margin: 12px 0;
            font-size: 0.85rem;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: #2c3e44;
        }
        .room-details span i {
            width: 20px;
            color: #4caf50;
        }
        .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1f3b4c;
            margin: 12px 0 8px;
        }
        .price small {
            font-size: 0.8rem;
            font-weight: 500;
            color: #5f7f8c;
        }
        .amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .amenity-tag {
            background: #eef2ff;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #1e4a6b;
        }
        .btn-book {
            background: linear-gradient(105deg, #2e7d32, #4caf50);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-book:hover {
            transform: scale(0.98);
            box-shadow: 0 6px 12px rgba(46,125,50,0.25);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-overlay.hidden { display: none; }
        .modal-content {
            background: white;
            border-radius: 36px;
            width: 90%;
            max-width: 520px;
            animation: slideUp 0.25s ease;
            box-shadow: 0 32px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 8px;
            border-bottom: 1px solid #edf2f7;
        }
        .modal-body { padding: 20px 24px; max-height: 60vh; overflow-y: auto; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 8px 24px 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; color: #2c3e44; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            font-size: 0.9rem;
            font-family: 'Inter', monospace;
        }
        input:focus, select:focus { outline: none; border-color: #4caf50; box-shadow: 0 0 0 3px rgba(76,175,80,0.1); }
        button {
            background: linear-gradient(105deg, #2e7d32, #4caf50);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-outline { background: #f1f5f9; color: #1f3b4c; border: 1px solid #cbd5e1; }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-error {
            background: #ffeaea;
            color: #c7362b;
            border-radius: 28px;
            padding: 10px 14px;
            margin-top: 14px;
            font-size: 0.8rem;
            border-left: 4px solid #f44336;
        }
        .hidden { display: none; }
        .saga-progress-container { min-height: 200px; }
        .saga-step-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f8fafc;
            border-radius: 20px;
            border-left: 3px solid #4caf50;
            font-size: 0.85rem;
        }
        .saga-step-loading { border-left-color: #ff9800; background: #fff8e7; }
        .saga-step-error { border-left-color: #f44336; background: #ffeaea; }
        .saga-step-success { border-left-color: #4caf50; background: #e8f5e9; }
        .code-input-group { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
        .verification-code-input {
            text-align: center;
            letter-spacing: 4px;
            font-size: 1.2rem;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        footer {
            text-align: center;
            padding: 24px;
            color: #5f7f8c;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>

<header>
    <div class="container header-content">
        <div class="logo"><i class="fas fa-hotel"></i> HotelBookPro</div>
        <div id="connectionIndicator" class="connection-badge"><i class="fas fa-circle" style="font-size: 0.7rem;"></i> connecting...</div>
    </div>
</header>

<div class="container">
    <!-- FILTERS SECTION -->
    <div class="filters-panel">
        <div class="filters-title"><i class="fas fa-sliders-h" style="color:#2e7d32;"></i> Refine your search</div>
        <div class="filters-grid">
            <div class="filter-field">
                <label>Check-in</label>
                <input type="date" id="filterFrom" placeholder="From">
            </div>
            <div class="filter-field">
                <label>Check-out</label>
                <input type="date" id="filterTo" placeholder="To">
            </div>
            <div class="filter-field">
                <label>Room class</label>
                <select id="filterRoomClass">
                    <option value="">Any</option>
                    <option value="Standard">Standard</option>
                    <option value="Deluxe">Deluxe</option>
                    <option value="Suite">Suite</option>
                    <option value="Family">Family</option>
                </select>
            </div>
            <div class="filter-field">
                <label>Capacity (min)</label>
                <input type="number" id="filterCapacity" min="1" placeholder="e.g., 2">
            </div>
            <div class="filter-field">
                <label>Min price ($)</label>
                <input type="number" id="filterMinPrice" step="0.01" placeholder="0">
            </div>
            <div class="filter-field">
                <label>Max price ($)</label>
                <input type="number" id="filterMaxPrice" step="0.01" placeholder="9999">
            </div>
            <div class="filter-field">
                <label>Floor</label>
                <input type="number" id="filterFloor" placeholder="Any floor">
            </div>
        </div>

        <!-- Amenities section -->
        <div class="amenities-section">
            <div class="amenities-title">Amenities</div>
            <div class="amenities-checkboxes" id="amenitiesGroup">
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="tv"> TV</label>
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="wifi"> Wi‑Fi</label>
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="minibar"> Minibar</label>
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="bathrobe"> Bathrobe</label>
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="slippers"> Slippers</label>
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="coffee_machine"> Coffee machine</label>
                <label class="amenity-checkbox"><input type="checkbox" data-amenity="air_conditioning"> A/C</label>

                <div class="view-select-container">
                    <label>View:</label>
                    <select id="filterView">
                        <option value="">Any</option>
                        <option value="city">City</option>
                        <option value="sea">Sea</option>
                        <option value="mountain">Mountain</option>
                        <option value="garden">Garden</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="filter-actions">
            <button id="resetFiltersBtn" class="btn-secondary"><i class="fas fa-undo-alt"></i> Reset</button>
            <button id="applyFiltersBtn"><i class="fas fa-search"></i> Apply Filters</button>
        </div>
    </div>

    <div class="rooms-section">
        <div class="section-title">
            <span><i class="fas fa-door-open" style="color:#4caf50;"></i> Available rooms</span>
            <button id="refreshRoomsBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="rooms-grid" id="roomsGrid">
            <div class="room-card" style="padding: 20px; text-align: center;">Loading luxury rooms...</div>
        </div>
        <div id="roomsCountBadge" style="margin-top: 16px; text-align: right; font-size: 0.8rem; color: #5f7f8c;"></div>
    </div>
</div>

<footer><div class="container">© 2026 HotelBookPro — instant booking with real-time confirmation</div></footer>

<!-- BOOKING FORM MODAL -->
<div id="bookingFormModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fas fa-calendar-check"></i> Complete your reservation</h3>
            <button class="btn-outline" id="closeBookingFormBtn" style="background:transparent; font-size:24px; padding:0 12px;">✕</button>
        </div>
        <div class="modal-body">
            <div id="bookingRoomInfo" style="background:#eef2fa; padding:14px; border-radius:20px; margin-bottom:16px; font-weight:500;"></div>
            <input type="hidden" id="selectedRoomId">
            <input type="hidden" id="selectedPricePerNight">
            <div class="form-group"><label>Full name *</label><input type="text" id="guestName" placeholder="John Doe" required></div>
            <div class="form-group"><label>Email *</label><input type="email" id="guestEmail" placeholder="john@example.com" required></div>
            <div class="form-group"><label>Phone *</label><input type="tel" id="guestPhone" placeholder="+1 234 567 8900" required></div>
            <div class="form-group"><label>Check-in *</label><input type="date" id="checkInDate" required></div>
            <div class="form-group"><label>Check-out *</label><input type="date" id="checkOutDate" required></div>
            <div class="form-group"><label>Currency</label><select id="currencySelect"><option value="USD">USD ($)</option><option value="EUR">EUR (€)</option><option value="GBP">GBP (£)</option></select></div>
            <div class="form-group"><label>Payment method</label><select id="paymentMethodSelect"><option value="credit_card">Credit Card</option><option value="paypal">PayPal</option></select></div>
            <div class="form-group"><label>Total price *</label><input type="text" id="totalPriceDisplay" readonly style="background:#f0f2f5; font-weight:bold;"></div>
            <div id="formModalError" class="modal-error hidden"></div>
        </div>
        <div class="modal-footer">
            <button id="cancelBookingFormBtn" class="btn-outline">Cancel</button>
            <button id="submitBookingBtn">Confirm & Pay</button>
        </div>
    </div>
</div>

<!-- SAGA PROGRESS MODAL -->
<div id="sagaProgressModal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 550px;">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fas fa-spinner fa-pulse"></i> Processing your booking</h3>
            <button class="btn-outline" id="closeSagaModalBtn" style="background:transparent; font-size:24px; padding:0 12px;">✕</button>
        </div>
        <div class="modal-body">
            <div id="sagaStepsContainer" class="saga-progress-container">
                <div class="saga-step-item saga-step-loading">Initializing secure transaction...</div>
            </div>
            <div id="codeVerificationSection" class="code-input-group hidden">
                <label style="font-weight:600;">Confirmation code</label>
                <input type="text" id="sagaCodeInput" class="verification-code-input" placeholder="• • • • • •" maxlength="6" autocomplete="off">
                <div id="sagaCodeError" class="modal-error hidden"></div>
                <button id="submitSagaCodeBtn" style="margin-top: 12px; width:100%;">Verify code</button>
            </div>
        </div>
        <div class="modal-footer">
            <button id="closeSagaProgressFooterBtn" class="btn-outline">Close</button>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:5255';
    const SIGNALR_HUB_URL = `${API_BASE_URL}/saga-process-hub`;

    let connection = null;
    let isConnected = false;
    let currentTrackingSagaId = null;
    let activeSagaModalOpen = false;
    let pendingCodeSagaId = null;

    const connectionIndicator = document.getElementById('connectionIndicator');
    const roomsGrid = document.getElementById('roomsGrid');
    const refreshRoomsBtn = document.getElementById('refreshRoomsBtn');
    const applyFiltersBtn = document.getElementById('applyFiltersBtn');
    const resetFiltersBtn = document.getElementById('resetFiltersBtn');

    // --- ИСПРАВЛЕННАЯ ФУНКЦИЯ СБОРА ФИЛЬТРОВ ---
    function collectFilters() {
        const from = document.getElementById('filterFrom').value;
        const to = document.getElementById('filterTo').value;
        const roomClass = document.getElementById('filterRoomClass').value;
        const capacity = document.getElementById('filterCapacity').value;
        const minPrice = document.getElementById('filterMinPrice').value;
        const maxPrice = document.getElementById('filterMaxPrice').value;
        const floor = document.getElementById('filterFloor').value;
        const viewSelect = document.getElementById('filterView').value;

        // Собираем ТОЛЬКО отмеченные чекбоксы (true)
        const amenities = {};

        // Булевые amenities - только если чекбокс отмечен
        document.querySelectorAll('#amenitiesGroup input[type="checkbox"][data-amenity]').forEach(cb => {
            if (cb.checked) {
                amenities[cb.dataset.amenity] = true;
            }
        });

        // Добавляем view, если выбрано значение
        if (viewSelect) {
            amenities['view'] = viewSelect;
        }

        // Формируем payload
        const payload = {};
        if (from) payload.from = from;
        if (to) payload.to = to;
        if (roomClass) payload.room_class = roomClass;
        if (capacity && !isNaN(parseInt(capacity))) payload.capacity = parseInt(capacity);
        if (minPrice && !isNaN(parseFloat(minPrice))) payload.minimal_price = parseFloat(minPrice);
        if (maxPrice && !isNaN(parseFloat(maxPrice))) payload.maximal_price = parseFloat(maxPrice);
        if (floor && !isNaN(parseInt(floor))) payload.floor = parseInt(floor);

        // Добавляем amenities только если объект не пустой
        if (Object.keys(amenities).length > 0) {
            payload.amenities = amenities;
        }

        console.log('Filters payload:', payload); // Для отладки

        return payload;
    }

    // Сброс фильтров
    function resetFilters() {
        document.getElementById('filterFrom').value = '';
        document.getElementById('filterTo').value = '';
        document.getElementById('filterRoomClass').value = '';
        document.getElementById('filterCapacity').value = '';
        document.getElementById('filterMinPrice').value = '';
        document.getElementById('filterMaxPrice').value = '';
        document.getElementById('filterFloor').value = '';
        document.getElementById('filterView').value = '';
        document.querySelectorAll('#amenitiesGroup input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    // --- FETCH ROOMS with filters ---
    async function fetchFreeRooms(filters = {}) {
        roomsGrid.innerHTML = `<div class="room-card" style="padding: 20px; text-align: center;"><i class="fas fa-spinner fa-pulse"></i> Loading premium rooms...</div>`;
        try {
            const response = await fetch(`${API_BASE_URL}/api/hotel`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(filters)
            });
            if (!response.ok) {
                const errorText = await extractErrorMessage(response);
                throw new Error(errorText || `HTTP ${response.status}`);
            }
            const data = await response.json();
            let rooms = [];
            if (Array.isArray(data)) rooms = data;
            else if (data.rooms && Array.isArray(data.rooms)) rooms = data.rooms;
            else if (data.data && Array.isArray(data.data)) rooms = data.data;
            else throw new Error("Invalid rooms data format");

            if (!rooms.length) {
                roomsGrid.innerHTML = `<div class="room-card" style="padding: 20px; text-align: center;">No free rooms available with selected filters</div>`;
                document.getElementById('roomsCountBadge').innerText = '';
                return;
            }
            renderRooms(rooms);
            document.getElementById('roomsCountBadge').innerHTML = `${rooms.length} ${rooms.length === 1 ? 'room available' : 'rooms available'}`;
        } catch (err) {
            roomsGrid.innerHTML = `<div class="room-card" style="padding: 20px; text-align: center;">⚠️ Failed to load rooms: ${err.message}<br><button id="retryRoomsBtn" style="margin-top:12px;">Retry</button></div>`;
            document.getElementById('retryRoomsBtn')?.addEventListener('click', () => fetchFreeRooms(collectFilters()));
        }
    }

    // --- RENDER ROOMS ---
    function renderRooms(rooms) {
        roomsGrid.innerHTML = '';
        rooms.forEach(room => {
            const card = document.createElement('div');
            card.className = 'room-card';
            const roomId = room.roomId || room.room_id || room.id || 'N/A';
            const roomType = room.type || 'Standard';
            const capacity = room.capacity || 2;
            const floor = room.floor ?? '—';
            const pricePerNight = room.price_per_night || room.pricePerNight || 0;
            const description = room.description || 'Comfortable and modern space';
            const amenitiesObj = room.amenities || {};
            const amenityList = Object.entries(amenitiesObj)
                .filter(([,v]) => v === true || (typeof v === 'string' && v))
                .map(([k]) => k)
                .slice(0, 4);
            const amenitiesHtml = amenityList.length
                ? amenityList.map(a => `<span class="amenity-tag">${escapeHtml(a)}</span>`).join('')
                : '<span class="amenity-tag">standard</span>';

            card.innerHTML = `
                <div class="room-img-placeholder"><i class="fas fa-bed fa-3x"></i></div>
                <div class="room-info">
                    <div class="room-title">${escapeHtml(roomId)}</div>
                    <div class="room-type">${escapeHtml(roomType)} • ${capacity} guests</div>
                    <div class="room-details">
                        <span><i class="fas fa-layer-group"></i> Floor ${floor}</span>
                        <span><i class="fas fa-tag"></i> $${pricePerNight}/night</span>
                    </div>
                    <div class="price">$${pricePerNight}<small> per night</small></div>
                    <div class="amenities">${amenitiesHtml}</div>
                    <div class="description" style="font-size:0.8rem; color:#4a6272; margin-bottom:8px;">${escapeHtml(description)}</div>
                    <button class="btn-book" data-room-id="${escapeHtml(roomId)}" data-price="${pricePerNight}" data-type="${escapeHtml(roomType)}" data-desc="${escapeHtml(description)}">📅 Book now</button>
                </div>
            `;
            roomsGrid.appendChild(card);
        });
        document.querySelectorAll('.btn-book').forEach(btn => {
            btn.addEventListener('click', () => {
                const roomId = btn.getAttribute('data-room-id');
                const price = parseFloat(btn.getAttribute('data-price'));
                const roomType = btn.getAttribute('data-type');
                const desc = btn.getAttribute('data-desc');
                openBookingFormModal({ roomId, pricePerNight: price, type: roomType, description: desc });
            });
        });
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // --- EVENT LISTENERS ---
    applyFiltersBtn.addEventListener('click', () => {
        const filters = collectFilters();
        fetchFreeRooms(filters);
    });

    resetFiltersBtn.addEventListener('click', () => {
        resetFilters();
        fetchFreeRooms({});
    });

    refreshRoomsBtn.addEventListener('click', () => {
        const filters = collectFilters();
        fetchFreeRooms(filters);
    });

    // --- SIGNALR & BOOKING LOGIC (без изменений) ---
    function updateConnectionUI(connected) {
        if (connected) {
            connectionIndicator.innerHTML = '<i class="fas fa-circle" style="font-size: 0.7rem; color: #4caf50;"></i> live';
            connectionIndicator.style.background = '#e8f5e9';
            connectionIndicator.style.color = '#2e7d32';
        } else {
            connectionIndicator.innerHTML = '<i class="fas fa-circle" style="font-size: 0.7rem; color: #f44336;"></i> offline';
            connectionIndicator.style.background = '#ffebee';
            connectionIndicator.style.color = '#c62828';
        }
    }

    async function initSignalR() {
        if (connection) return;
        connection = new signalR.HubConnectionBuilder()
            .withUrl(SIGNALR_HUB_URL)
            .withAutomaticReconnect([0, 2000, 5000, 10000])
            .build();

        connection.on("ReceiveSagaProgress", (sagaId, step, status, message) => {
            if (sagaId === currentTrackingSagaId && activeSagaModalOpen) {
                addSagaStepToModal(step, status, message);
                if (step === "Notification" && status?.toLowerCase() === "completed") {
                    showCodeVerificationInModal(sagaId);
                }
            }
        });

        connection.on("ReceiveSagaError", (sagaId, step, errorCode, errorMessage) => {
            if (sagaId === currentTrackingSagaId && activeSagaModalOpen) {
                addSagaStepToModal(step, `ERROR ${errorCode}`, errorMessage, true);
                if (step === "Notification" && pendingCodeSagaId === sagaId) {
                    const errDiv = document.getElementById('sagaCodeError');
                    if (errDiv) {
                        errDiv.innerText = `Verification failed: ${errorMessage}`;
                        errDiv.classList.remove('hidden');
                    }
                    enableCodeRetry();
                }
            }
        });

        connection.onclose(() => { isConnected = false; updateConnectionUI(false); });
        connection.onreconnected(() => {
            isConnected = true;
            updateConnectionUI(true);
            if (currentTrackingSagaId && activeSagaModalOpen) {
                connection.invoke("JoinSagaGroup", currentTrackingSagaId).catch(e => console.warn);
            }
        });
    }

    async function connectSignalR() {
        if (isConnected) return;
        try {
            await initSignalR();
            await connection.start();
            isConnected = true;
            updateConnectionUI(true);
        } catch(err) {
            updateConnectionUI(false);
        }
    }

    async function joinSagaGroup(sagaId) {
        if (!isConnected) await connectSignalR();
        if (currentTrackingSagaId && currentTrackingSagaId !== sagaId) {
            try { if (connection) await connection.invoke("LeaveSagaGroup", currentTrackingSagaId); } catch(e) {}
        }
        try {
            await connection.invoke("JoinSagaGroup", sagaId);
            currentTrackingSagaId = sagaId;
        } catch(err) {
            console.error("Join group failed", err);
        }
    }

    async function extractErrorMessage(response) {
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
            try {
                const json = await response.json();
                return json.error || json.detail || json.message || JSON.stringify(json);
            } catch (e) {
                return 'Invalid JSON error response';
            }
        } else {
            const text = await response.text();
            return text || `Request failed with status ${response.status}`;
        }
    }

    function openBookingFormModal(room) {
        document.getElementById('selectedRoomId').value = room.roomId;
        document.getElementById('selectedPricePerNight').value = room.pricePerNight;
        document.getElementById('bookingRoomInfo').innerHTML = `<strong>${room.roomId}</strong> (${room.type}) • $${room.pricePerNight}/night<br><small>${room.description || ''}</small>`;
        document.getElementById('guestName').value = '';
        document.getElementById('guestEmail').value = '';
        document.getElementById('guestPhone').value = '';
        document.getElementById('totalPriceDisplay').value = '';
        document.getElementById('formModalError').classList.add('hidden');

        const today = new Date().toISOString().split('T')[0];
        const checkIn = document.getElementById('checkInDate');
        const checkOut = document.getElementById('checkOutDate');
        checkIn.min = today; checkOut.min = today;
        checkIn.value = ''; checkOut.value = '';

        const updateTotal = () => {
            const start = checkIn.value, end = checkOut.value;
            if (start && end && new Date(end) > new Date(start)) {
                const nights = Math.ceil((new Date(end) - new Date(start)) / (1000*60*60*24));
                const total = (room.pricePerNight * nights).toFixed(2);
                document.getElementById('totalPriceDisplay').value = `${total} USD`;
            } else {
                document.getElementById('totalPriceDisplay').value = '— select dates';
            }
        };
        checkIn.removeEventListener('change', updateTotal);
        checkOut.removeEventListener('change', updateTotal);
        checkIn.addEventListener('change', updateTotal);
        checkOut.addEventListener('change', updateTotal);
        document.getElementById('bookingFormModal').classList.remove('hidden');
    }

    async function submitBooking() {
        const roomId = document.getElementById('selectedRoomId').value;
        const guestName = document.getElementById('guestName').value.trim();
        const guestEmail = document.getElementById('guestEmail').value.trim();
        const guestPhone = document.getElementById('guestPhone').value.trim();
        const checkIn = document.getElementById('checkInDate').value;
        const checkOut = document.getElementById('checkOutDate').value;
        const currency = document.getElementById('currencySelect').value;
        const paymentMethod = document.getElementById('paymentMethodSelect').value;
        const pricePerNight = parseFloat(document.getElementById('selectedPricePerNight').value);

        if(!guestName || !guestEmail || !guestPhone || !checkIn || !checkOut) {
            showFormError('Please fill all fields');
            return;
        }
        const nights = Math.ceil((new Date(checkOut) - new Date(checkIn)) / (1000*60*60*24));
        if (nights <= 0) {
            showFormError('Check-out must be after check-in');
            return;
        }
        const totalPrice = pricePerNight * nights;

        const payload = {
            room_id: roomId,
            guest_name: guestName,
            guest_email: guestEmail,
            guest_phone: guestPhone,
            check_in: new Date(checkIn).toISOString(),
            check_out: new Date(checkOut).toISOString(),
            total_price: totalPrice,
            currency: currency,
            payment_method: paymentMethod,
            payment_reservation_id: `RES_${Date.now()}_${Math.floor(Math.random()*10000)}`
        };

        const submitBtn = document.getElementById('submitBookingBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Processing';
        try {
            const response = await fetch(`${API_BASE_URL}/api/booking`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const errorMessage = await extractErrorMessage(response);
                throw new Error(errorMessage);
            }
            const result = await response.json();
            const sagaId = result.sagaId;
            if (!sagaId) throw new Error('No sagaId in response');

            document.getElementById('bookingFormModal').classList.add('hidden');
            openSagaProgressModal(sagaId);
            await joinSagaGroup(sagaId);
        } catch (err) {
            showFormError(err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Confirm & Pay';
        }
    }

    function showFormError(msg) {
        const errDiv = document.getElementById('formModalError');
        errDiv.innerText = msg;
        errDiv.classList.remove('hidden');
        setTimeout(() => errDiv.classList.add('hidden'), 7000);
    }

    function openSagaProgressModal(sagaId) {
        const container = document.getElementById('sagaStepsContainer');
        container.innerHTML = '<div class="saga-step-item saga-step-loading">Initializing secure transaction...</div>';
        document.getElementById('codeVerificationSection').classList.add('hidden');
        document.getElementById('sagaCodeInput').value = '';
        document.getElementById('sagaCodeError').classList.add('hidden');
        const codeInput = document.getElementById('sagaCodeInput');
        const verifyBtn = document.getElementById('submitSagaCodeBtn');
        codeInput.disabled = false;
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify code';
        pendingCodeSagaId = null;
        activeSagaModalOpen = true;
        currentTrackingSagaId = sagaId;
        document.getElementById('sagaProgressModal').classList.remove('hidden');
        addSagaStepToModal('Booking', 'started', 'Saga initiated, waiting for server response...');
    }

    function addSagaStepToModal(step, status, message, isError = false) {
        const container = document.getElementById('sagaStepsContainer');
        const stepDiv = document.createElement('div');
        let statusClass = 'saga-step-success';
        if (isError || status?.toLowerCase() === 'failed') statusClass = 'saga-step-error';
        else if (status?.toLowerCase() === 'running' || status?.toLowerCase() === 'started') statusClass = 'saga-step-loading';
        else statusClass = 'saga-step-success';
        stepDiv.className = `saga-step-item ${statusClass}`;
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        stepDiv.innerHTML = `<strong>${step}</strong> ${status ? `[${status}]` : ''}<br>${message}<br><span style="font-size:0.7rem; color:#6c757d;">${time}</span>`;
        container.appendChild(stepDiv);
        container.scrollTop = container.scrollHeight;
    }

    function showCodeVerificationInModal(sagaId) {
        pendingCodeSagaId = sagaId;
        const section = document.getElementById('codeVerificationSection');
        section.classList.remove('hidden');
        const codeInput = document.getElementById('sagaCodeInput');
        const verifyBtn = document.getElementById('submitSagaCodeBtn');
        codeInput.disabled = false;
        codeInput.value = '';
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify code';
        codeInput.focus();
        const errDiv = document.getElementById('sagaCodeError');
        errDiv.classList.add('hidden');
        errDiv.innerText = '';
        codeInput.oninput = () => {
            errDiv.classList.add('hidden');
            errDiv.innerText = '';
        };
    }

    function enableCodeRetry() {
        const codeInput = document.getElementById('sagaCodeInput');
        const verifyBtn = document.getElementById('submitSagaCodeBtn');
        codeInput.disabled = false;
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify code';
        codeInput.focus();
    }

    async function submitSagaCode() {
        const codeInput = document.getElementById('sagaCodeInput');
        const verifyBtn = document.getElementById('submitSagaCodeBtn');
        const code = codeInput.value.trim();
        if (!code || code.length < 4) {
            const errDiv = document.getElementById('sagaCodeError');
            errDiv.innerText = 'Please enter the 6-digit confirmation code';
            errDiv.classList.remove('hidden');
            return;
        }
        const sagaId = pendingCodeSagaId || currentTrackingSagaId;
        if (!sagaId) return;

        codeInput.disabled = true;
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';
        try {
            const response = await fetch(`${API_BASE_URL}/api/booking/${sagaId}/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sagaId: sagaId, code: code })
            });
            if (response.ok) {
                addSagaStepToModal('Verification', 'completed', 'Code confirmed successfully! Booking finalized.');
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = 'Verified ✓';
                codeInput.disabled = true;
            } else {
                let errorMsg = 'Invalid confirmation code. Please try again.';
                try { errorMsg = await extractErrorMessage(response); } catch(e) {}
                const errDiv = document.getElementById('sagaCodeError');
                errDiv.innerText = errorMsg;
                errDiv.classList.remove('hidden');
                addSagaStepToModal('Verification', 'failed', errorMsg, true);
                codeInput.disabled = false;
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'Verify code';
                codeInput.focus();
                codeInput.oninput = () => {
                    errDiv.classList.add('hidden');
                    errDiv.innerText = '';
                };
            }
        } catch (netErr) {
            const errDiv = document.getElementById('sagaCodeError');
            errDiv.innerText = `Network error: ${netErr.message}`;
            errDiv.classList.remove('hidden');
            codeInput.disabled = false;
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = 'Verify code';
        }
    }

    function closeSagaModal() {
        activeSagaModalOpen = false;
        document.getElementById('sagaProgressModal').classList.add('hidden');
    }

    // Attach event listeners
    document.getElementById('submitBookingBtn').addEventListener('click', submitBooking);
    document.getElementById('cancelBookingFormBtn').addEventListener('click', () => document.getElementById('bookingFormModal').classList.add('hidden'));
    document.getElementById('closeBookingFormBtn').addEventListener('click', () => document.getElementById('bookingFormModal').classList.add('hidden'));
    document.getElementById('closeSagaModalBtn').addEventListener('click', closeSagaModal);
    document.getElementById('closeSagaProgressFooterBtn').addEventListener('click', closeSagaModal);
    document.getElementById('submitSagaCodeBtn').addEventListener('click', submitSagaCode);

    // Initialize connection and fetch rooms with empty filters
    connectSignalR();
    fetchFreeRooms({});
</script>
</body>
</html>
