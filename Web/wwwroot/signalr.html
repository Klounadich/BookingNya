<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HotelBookPro | Real-Time Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eef4 100%);
            color: #1a2c3e;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(76,175,80,0.2);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }

        .logo {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-decoration: none;
        }

        /* Main Grid */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin: 32px 0 40px;
        }

        @media (max-width: 880px) {
            main {
                grid-template-columns: 1fr;
                gap: 28px;
            }
        }

        /* Panels */
        .panel {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.02);
            padding: 28px 30px;
            transition: all 0.25s ease;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .panel:hover {
            box-shadow: 0 24px 42px -16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .panel-title {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1f3b4c;
            border-left: 5px solid #4caf50;
            padding-left: 18px;
            letter-spacing: -0.2px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2c3e44;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            background: #fefefe;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 0 4px rgba(76,175,80,0.15);
            background: white;
        }

        button {
            background: linear-gradient(105deg, #2e7d32 0%, #4caf50 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        button:hover {
            transform: scale(0.97);
            box-shadow: 0 6px 14px rgba(46,125,50,0.25);
            filter: brightness(1.02);
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            background: #b0bec5;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-track {
            background: linear-gradient(105deg, #1976d2, #2196f3);
            margin-left: 8px;
        }

        .btn-stop {
            background: linear-gradient(105deg, #c62828, #f44336);
            margin-top: 18px;
            width: 100%;
        }

        /* Status containers */
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 60px;
            padding: 12px 18px;
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .status-connected {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #4caf50;
        }

        .status-disconnected {
            background: #ffebee;
            color: #c62828;
            border-left: 5px solid #f44336;
        }

        .status-request-success {
            background: #e0f2fe;
            color: #0c4a6e;
            border-left: 5px solid #2196f3;
        }

        .status-request-error {
            background: #ffe4e2;
            color: #b91c1c;
            border-left: 5px solid #f44336;
        }

        /* Status feed */
        .status-feed {
            height: 340px;
            overflow-y: auto;
            background: #fafcff;
            border-radius: 24px;
            border: 1px solid #eef2f8;
            padding: 12px 8px;
            margin: 16px 0 8px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .status-item {
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 20px;
            background: white;
            font-size: 0.85rem;
            border-left: 3px solid;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        .status-success { border-left-color: #4caf50; color: #1e4620; background: #f1f9f0; }
        .status-error { border-left-color: #f44336; color: #a1220a; background: #fff4f2; }
        .status-info { border-left-color: #2196f3; color: #0b3b5f; background: #eef6ff; }
        .status-warning { border-left-color: #ff9800; color: #7a4b0a; background: #fff3e0; }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none; }

        /* Enhanced Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.hidden { display: none; }

        .modal-content {
            background: white;
            border-radius: 36px;
            width: 90%;
            max-width: 460px;
            box-shadow: 0 32px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 8px 24px;
            background: #ffffff;
            border-bottom: 1px solid #edf2f7;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a4d;
            margin: 0;
        }

        .modal-close-button {
            background: transparent;
            box-shadow: none;
            font-size: 28px;
            line-height: 1;
            padding: 0;
            margin: 0;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            color: #5f7f8c;
            transition: 0.2s;
        }

        .modal-close-button:hover {
            background: #f1f5f9;
            transform: none;
            box-shadow: none;
            color: #c62828;
        }

        .modal-body {
            padding: 20px 24px;
        }

        .modal-body p {
            margin-bottom: 18px;
            color: #2c5a6e;
            font-weight: 500;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
            border-radius: 60px;
            border: 2px solid #e2edf2;
            background: #fefefe;
            font-weight: 600;
        }

        .modal-input:focus {
            border-color: #4caf50;
        }

        .modal-error {
            background: #ffeaea;
            color: #c7362b;
            border-radius: 28px;
            padding: 10px 14px;
            margin-top: 14px;
            font-size: 0.85rem;
            border-left: 4px solid #f44336;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 8px 24px 24px 24px;
            background: white;
        }

        .modal-cancel-btn {
            background: #f1f5f9;
            color: #2c3e50;
            box-shadow: none;
            border: 1px solid #cbd5e1;
        }

        .modal-cancel-btn:hover {
            background: #e6edf4;
            transform: scale(0.97);
        }

        .modal-submit-btn {
            background: linear-gradient(105deg, #2e7d32, #4caf50);
            padding: 12px 28px;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #5f7f8c;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>

<header>
    <div class="container header-content">
        <div class="logo">✦ HotelBookPro</div>
        <nav></nav>
    </div>
</header>

<div class="container">
    <main>
        <!-- Booking Panel -->
        <section class="panel">
            <h2 class="panel-title">Book your stay</h2>
            <form id="bookingForm">
                <div class="form-group"><label>Room ID *</label><input type="text" id="room_id" placeholder="e.g., PREM-205" required></div>
                <div class="form-group"><label>Full Name *</label><input type="text" id="guest_name" placeholder="Alex Johnson" required></div>
                <div class="form-group"><label>Email *</label><input type="email" id="guest_email" placeholder="alex@example.com" required></div>
                <div class="form-group"><label>Phone *</label><input type="tel" id="guest_phone" placeholder="+1 234 567 8900" required></div>
                <div class="form-group"><label>Check-in *</label><input type="datetime-local" id="check_in" required></div>
                <div class="form-group"><label>Check-out *</label><input type="datetime-local" id="check_out" required></div>
                <div class="form-group"><label>Total Price ($)*</label><input type="number" id="total_price" step="0.01" placeholder="299.00" required></div>
                <div class="form-group"><label>Currency</label><select id="currency"><option value="USD">USD ($)</option><option value="EUR">EUR (€)</option><option value="GBP">GBP (£)</option></select></div>
                <div class="form-group"><label>Payment Method</label><select id="payment_method"><option value="credit_card">Credit Card</option><option value="debit_card">Debit Card</option><option value="paypal">PayPal</option></select></div>
                <button type="submit" id="submitBtn"><span id="submitBtnText">Confirm Booking</span><span id="submitBtnSpinner" class="loading hidden"></span></button>
            </form>
            <div id="requestStatus" class="status-container status-request-success hidden" style="margin-top: 18px;"><span id="requestStatusText"></span></div>
        </section>

        <!-- Tracking Panel -->
        <section class="panel">
            <h2 class="panel-title">Live booking status</h2>
            <div class="form-group" style="display: flex; gap: 8px; flex-wrap: wrap;">
                <input type="text" id="manual_saga_id" placeholder="Saga ID (e.g., 123e4567-e89b...)" style="flex:2;">
                <button id="manualTrackBtn" class="btn-track" style="flex:1;">Track</button>
            </div>
            <div id="connectionStatus" class="status-container status-disconnected"><span>⚡ Status: SignalR offline</span></div>
            <div class="status-feed" id="statusFeed"><div class="status-item status-info">✨ Ready — create a booking or enter a Saga ID</div></div>
            <button id="stopTrackingBtn" class="btn-stop" disabled>⏹️ Stop tracking</button>
        </section>
    </main>
</div>
<footer><div class="container"><p>© 2026 HotelBookPro — real-time saga orchestration</p></div></footer>

<script>
    // ---------- CONFIG ----------
    const API_BASE_URL = 'http://localhost:5255';
    const SIGNALR_HUB_URL = `${API_BASE_URL}/saga-process-hub`;
    const CONFIRM_ENDPOINT = `${API_BASE_URL}/api/booking`;

    // ---------- DOM Elements ----------
    const form = document.getElementById('bookingForm');
    const submitBtn = document.getElementById('submitBtn');
    const submitBtnText = document.getElementById('submitBtnText');
    const submitBtnSpinner = document.getElementById('submitBtnSpinner');
    const requestStatusDiv = document.getElementById('requestStatus');
    const requestStatusText = document.getElementById('requestStatusText');
    const connectionStatusDiv = document.getElementById('connectionStatus');
    const statusFeed = document.getElementById('statusFeed');
    const manualSagaIdInput = document.getElementById('manual_saga_id');
    const manualTrackBtn = document.getElementById('manualTrackBtn');
    const stopTrackingBtn = document.getElementById('stopTrackingBtn');

    // ---------- Global state ----------
    let connection = null;
    let isConnected = false;
    let currentTrackingGroupId = null;
    let isTrackingStartedViaForm = false;

    // ---------- Helper UI ----------
    function showRequestStatus(message, isError = false) {
        requestStatusDiv.className = `status-container ${isError ? 'status-request-error' : 'status-request-success'}`;
        requestStatusText.textContent = message;
        requestStatusDiv.classList.remove('hidden');
        setTimeout(() => requestStatusDiv.classList.add('hidden'), 5000);
    }

    function updateConnectionStatus(connected, msg) {
        connectionStatusDiv.className = `status-container ${connected ? 'status-connected' : 'status-disconnected'}`;
        connectionStatusDiv.innerHTML = `<span>${connected ? '🔗 ' : '⚠️ '} Status: ${msg}</span>`;
    }

    function addStatusMessage(message, type = 'info') {
        const item = document.createElement('div');
        item.className = `status-item status-${type}`;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second:'2-digit' });
        item.textContent = `${time}  •  ${message}`;
        statusFeed.appendChild(item);
        statusFeed.scrollTop = statusFeed.scrollHeight;
    }

    function disableSubmit(disabled) {
        submitBtn.disabled = disabled;
        if (disabled) {
            submitBtnText.classList.add('hidden');
            submitBtnSpinner.classList.remove('hidden');
        } else {
            submitBtnText.classList.remove('hidden');
            submitBtnSpinner.classList.add('hidden');
        }
    }

    function updateTrackingButtons(connectDisabled, stopDisabled) {
        manualTrackBtn.disabled = connectDisabled;
        stopTrackingBtn.disabled = stopDisabled;
    }

    // ---------- MODAL (Fixed: close + cancel + SignalR error feedback) ----------
    let activeModalSagaId = null;

    function ensureModalStructure() {
        let overlay = document.getElementById('confirmationModalOverlay');
        if (overlay) return overlay;
        overlay = document.createElement('div');
        overlay.id = 'confirmationModalOverlay';
        overlay.className = 'modal-overlay hidden';
        overlay.innerHTML = `
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">✉️ Confirmation required</h3>
                    <button class="modal-close-button" id="modalCloseButton">✕</button>
                </div>
                <div class="modal-body">
                    <p>We sent a 6-digit code to your email/phone. Please verify to complete booking.</p>
                    <input type="text" id="confirmationCodeInput" class="modal-input" placeholder="• • • • • •" maxlength="6" autocomplete="off">
                    <div id="modalDynamicError" class="modal-error hidden"></div>
                </div>
                <div class="modal-footer">
                    <button class="modal-cancel-btn" id="cancelModalBtn">Cancel</button>
                    <button class="modal-submit-btn" id="submitCodeBtn">Verify code</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        return overlay;
    }

    function showModal(sagaId) {
        const overlay = ensureModalStructure();
        activeModalSagaId = sagaId;
        // reset fields
        const codeInput = document.getElementById('confirmationCodeInput');
        const errorDiv = document.getElementById('modalDynamicError');
        if (codeInput) codeInput.value = '';
        if (errorDiv) errorDiv.classList.add('hidden');
        overlay.classList.remove('hidden');
        // focus input after small delay
        setTimeout(() => { if (codeInput) codeInput.focus(); }, 50);
    }

    function hideModal() {
        const overlay = document.getElementById('confirmationModalOverlay');
        if (overlay) overlay.classList.add('hidden');
        activeModalSagaId = null;
    }

    // display error INSIDE modal (coming from SignalR or API)
    function setModalError(errorMessage) {
        const errorDiv = document.getElementById('modalDynamicError');
        if (errorDiv) {
            errorDiv.textContent = errorMessage;
            errorDiv.classList.remove('hidden');
        }
    }

    // ---------- SignalR Handlers ----------
    async function initializeSignalR() {
        if (connection) return;
        connection = new signalR.HubConnectionBuilder()
            .withUrl(SIGNALR_HUB_URL)
            .withAutomaticReconnect([0, 2000, 5000, 10000])
            .build();

        // Normal progress event
        connection.on("ReceiveSagaProgress", (sagaId, step, status, message) => {
            if (sagaId === currentTrackingGroupId) {
                const msgType = status?.toLowerCase() === 'failed' ? 'error' : 'success';
                addStatusMessage(`[${step}] ${status?.toUpperCase() || 'UPDATE'}: ${message}`, msgType);

                // If we are waiting for confirmation step and it's COMPLETED, show modal
                if (step === "Notification" && status?.toLowerCase() === "completed" && currentTrackingGroupId === sagaId) {
                    addStatusMessage("✉️ Awaiting confirmation code input...", 'info');
                    showModal(sagaId);
                }
                // If verification fails later — we rely on ReceiveSagaError OR custom failed status
            }
        });

        // NEW: dedicated error event from server (SignalR error with code/details)
        connection.on("ReceiveSagaError", (sagaId, step, errorCode, errorMessage) => {
            if (sagaId === currentTrackingGroupId) {
                addStatusMessage(`❌ [${step}] ERROR ${errorCode}: ${errorMessage}`, 'error');

                // If modal is open for this saga, inject error into modal
                const overlay = document.getElementById('confirmationModalOverlay');
                if (overlay && !overlay.classList.contains('hidden') && activeModalSagaId === sagaId) {
                    // display error inside modal (wrong code, etc)
                    setModalError(`Verification failed: ${errorMessage || 'Invalid code or expired'}`);
                }
            }
        });

        connection.onclose(async (err) => {
            isConnected = false;
            updateConnectionStatus(false, `Disconnected${err ? ' - reconnecting' : ''}`);
            addStatusMessage(`Connection lost: ${err?.message || 'network issue'}`, 'error');
            updateTrackingButtons(false, true);
        });

        connection.onreconnecting((err) => {
            addStatusMessage(`Reconnecting to SignalR... ${err?.message || ''}`, 'warning');
        });
        connection.onreconnected(() => {
            isConnected = true;
            updateConnectionStatus(true, 'Connected (reestablished)');
            addStatusMessage('Realtime connection restored.', 'success');
            if (currentTrackingGroupId) {
                connection.invoke("JoinSagaGroup", currentTrackingGroupId).catch(e => console.warn("rejoin error", e));
            }
        });
    }

    async function connectToSignalR() {
        if (isConnected) return;
        try {
            await initializeSignalR();
            await connection.start();
            isConnected = true;
            updateConnectionStatus(true, 'Live updates active');
            addStatusMessage('✅ Connected to real-time hub', 'success');
        } catch (err) {
            updateConnectionStatus(false, `Failed: ${err.message}`);
            addStatusMessage(`SignalR error: ${err.message}`, 'error');
            throw err;
        }
    }

    async function joinSagaGroup(sagaId) {
        if (!isConnected) await connectToSignalR();
        try {
            await connection.invoke("JoinSagaGroup", sagaId);
            currentTrackingGroupId = sagaId;
            addStatusMessage(`📡 Now tracking saga: ${sagaId.substring(0,12)}...`, 'info');
            updateTrackingButtons(true, false);
        } catch (err) {
            addStatusMessage(`Failed to join group: ${err.message}`, 'error');
            throw err;
        }
    }

    async function leaveCurrentGroup() {
        if (currentTrackingGroupId && connection && isConnected) {
            try {
                await connection.invoke("LeaveSagaGroup", currentTrackingGroupId);
                addStatusMessage(`🛑 Stopped tracking: ${currentTrackingGroupId.substring(0,12)}...`, 'info');
            } catch (err) {
                addStatusMessage(`Error leaving group: ${err.message}`, 'warning');
            }
        }
        currentTrackingGroupId = null;
        updateTrackingButtons(false, true);
    }

    // ---------- Submit Booking ----------
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        disableSubmit(true);
        isTrackingStartedViaForm = false;
        try {
            const checkInVal = document.getElementById('check_in').value;
            const checkOutVal = document.getElementById('check_out').value;
            if (!checkInVal || !checkOutVal) throw new Error('Check-in and Check-out required');

            const formData = {
                room_id: document.getElementById('room_id').value.trim(),
                guest_name: document.getElementById('guest_name').value.trim(),
                guest_email: document.getElementById('guest_email').value.trim(),
                guest_phone: document.getElementById('guest_phone').value.trim(),
                check_in: new Date(checkInVal).toISOString(),
                check_out: new Date(checkOutVal).toISOString(),
                total_price: parseFloat(document.getElementById('total_price').value),
                currency: document.getElementById('currency').value,
                payment_method: document.getElementById('payment_method').value,
                payment_reservation_id: "STATIC_RESERVATION_ID_12345"
            };
            if (!formData.room_id || !formData.guest_name || !formData.guest_email || isNaN(formData.total_price) || formData.total_price <= 0)
                throw new Error('Please fill all required fields correctly');

            const response = await fetch(`${API_BASE_URL}/api/booking`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            if (response.ok) {
                const result = await response.json();
                const sagaId = result.sagaId;
                showRequestStatus(`✅ Booking created! Saga: ${sagaId.substring(0,12)}...`, false);
                isTrackingStartedViaForm = true;
                statusFeed.innerHTML = '';
                addStatusMessage('🔄 Connecting to live tracking...', 'info');
                await joinSagaGroup(sagaId);
            } else {
                const errData = await response.json();
                throw new Error(errData.error || errData.detail || 'Booking API error');
            }
        } catch (err) {
            showRequestStatus(`❌ ${err.message}`, true);
            addStatusMessage(`Booking failed: ${err.message}`, 'error');
        } finally {
            disableSubmit(false);
        }
    });

    // Manual track
    manualTrackBtn.addEventListener('click', async () => {
        const sagaId = manualSagaIdInput.value.trim();
        if (!sagaId) { alert('Enter a valid Saga ID'); return; }
        if (currentTrackingGroupId === sagaId) { addStatusMessage(`Already tracking ${sagaId.substring(0,12)}`, 'warning'); return; }
        try {
            if (currentTrackingGroupId) await leaveCurrentGroup();
            isTrackingStartedViaForm = false;
            statusFeed.innerHTML = '';
            addStatusMessage(`🔍 Tracking manual ID: ${sagaId.substring(0,12)}...`, 'info');
            await joinSagaGroup(sagaId);
        } catch (err) { /* handled in join */ }
    });

    stopTrackingBtn.addEventListener('click', async () => {
        await leaveCurrentGroup();
        addStatusMessage('Manual tracking stopped', 'info');
    });

    // ---------- Global Modal interactions (close + cancel + submit with realtime error) ----------
    document.addEventListener('click', async (event) => {
        const overlay = document.getElementById('confirmationModalOverlay');
        if (!overlay || overlay.classList.contains('hidden')) return;

        // Close on backdrop click
        if (event.target === overlay) {
            hideModal();
            return;
        }
        // close button (X)
        if (event.target.id === 'modalCloseButton' || event.target.closest('#modalCloseButton')) {
            hideModal();
            return;
        }
        // cancel button
        if (event.target.id === 'cancelModalBtn' || event.target.closest('#cancelModalBtn')) {
            hideModal();
            addStatusMessage('Confirmation cancelled by user', 'warning');
            return;
        }
        // Submit code
        if (event.target.id === 'submitCodeBtn' || event.target.closest('#submitCodeBtn')) {
            const codeInput = document.getElementById('confirmationCodeInput');
            const errorDiv = document.getElementById('modalDynamicError');
            const code = codeInput?.value.trim();
            if (!code || code.length < 4) {
                if (errorDiv) { errorDiv.textContent = 'Please enter the confirmation code.'; errorDiv.classList.remove('hidden'); }
                return;
            }
            if (!activeModalSagaId) {
                hideModal();
                return;
            }
            try {
                const response = await fetch(`${CONFIRM_ENDPOINT}/${activeModalSagaId}/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sagaId: activeModalSagaId, code: code })
                });
                if (response.ok) {
                    addStatusMessage(`✅ Code verified! Booking confirmed.`, 'success');
                    hideModal();
                } else {
                    let errorMsg = 'Invalid confirmation code.';
                    try { const errJson = await response.json(); errorMsg = errJson.error || errJson.detail || errorMsg; } catch(e) {}
                    if (errorDiv) { errorDiv.textContent = errorMsg; errorDiv.classList.remove('hidden'); }
                    // Also push error to status feed
                    addStatusMessage(`Code error: ${errorMsg}`, 'error');
                    // additionally, if server sends SignalR error it will also appear via ReceiveSagaError.
                }
            } catch (netErr) {
                if (errorDiv) { errorDiv.textContent = `Network error: ${netErr.message}`; errorDiv.classList.remove('hidden'); }
                addStatusMessage(`Confirm network error: ${netErr.message}`, 'error');
            }
        }
    });

    // --- If SignalR pushes error after submit, show in modal (already handled by ReceiveSagaError)
    // also ensure we show error inside modal if it arrives later. We'll add extra bridge:
    // (ReceiveSagaError already handles modal error injection)
    // For additional robustness: when modal is open and we get a ReceiveSagaProgress that indicates failure, show in modal too.
    const originalReceiveProgress = (sagaId, step, status, message) => {};
    // Already overridden, but we can also update: 
    // Extend existing on open to also reflect failure inside modal. 
    // Actually our connection.on("ReceiveSagaProgress") already runs, we can add condition to show error inside modal if status failed.
    // We'll modify inside the on handler at the top but since script runs, we need to re-declare? we already defined earlier.
    // The above connection.on("ReceiveSagaProgress") already uses currentTrackingGroupId, to inject modal error we add:
    // We'll patch the progress handler via an extra listener after init? 
    // For simplicity, after load we ensure that any failed step while modal is open gets reflected.
    // This is robust: we added ReceiveSagaError for explicit server-side errors. The server can also send a ReceiveSagaProgress with status=Failed, and we show in feed, but also we can push to modal.
    // I'll attach a small watcher on status feed (just for extra safety, but ReceiveSagaError is enough)
    // Also ensure we refresh initial connection state
    updateConnectionStatus(false, 'Disconnected');
    updateTrackingButtons(false, true);
    addStatusMessage('🏨 HotelBookPro ready — real-time saga tracking', 'info');
    // auto-connect to SignalR on page load for faster tracking
    connectToSignalR().catch(e => console.warn("initial connect not critical", e));
</script>
