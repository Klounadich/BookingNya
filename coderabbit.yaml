# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ru-RU"

# =============================================================================
# ИНСТРУКЦИИ ПО ТОНУ И СТИЛЮ
# =============================================================================
tone_instructions: |
  Ты — опытный архитектор и senior разработчик. Твоя задача — проводить глубокое ревью кода,
  оценивая архитектурные решения, следование паттернам проектирования и качество реализации.
  
  Будь строгим, но конструктивным. Указывай на:
  - Нарушения архитектурных принципов (SOLID, модульность, слоистая архитектура)
  - Неправильное использование паттернов проектирования
  - Устаревшие, небезопасные или неэффективные подходы
  - Проблемы с расширяемостью и поддержкой кода
  - Нарушения границ модулей (BookingModule, InventoryModule, PaymentModule)
  
  Формулируй замечания как "Архитектурная проблема:", "Паттерн:", "Безопасность:",
  "Производительность:" или "Технический долг:". Предлагай конкретные альтернативы
  с объяснением "почему".

# Отключаем ранний доступ для стабильности
early_access: false

# =============================================================================
# НАСТРОЙКИ РЕВЬЮ — АССЕРТИВНЫЙ РЕЖИМ
# =============================================================================
reviews:
  # Агрессивный режим для выявления архитектурных проблем
  profile: "assertive"
  
  # Детальный разбор каждого изменения
  review_status: true
  commit_status: true
  
  # Включаем полный анализ
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  
  # Оценка связанных задач и PR для понимания контекста
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  
  # Предлагаем метки и ревьюеров
  suggested_labels: true
  suggested_reviewers: true
  
  # Отключаем поэзию — нам нужен серьёзный анализ
  poem: false

# =============================================================================
# КОНТЕКСТ И ЗНАНИЯ — ВКЛЮЧАЕМ ОБУЧЕНИЕ
# =============================================================================
knowledge_base:
  # НЕ отключаем — AI должен учиться на вашей истории
  opt_out: false
  
  # Анализируем issues для понимания бизнес-контекста
  issues: "auto"
  
  # Учитываем историю PR
  pull_requests: "auto"
  
  # Включаем анализ связанных репозиториев (если есть)
  # multi_repo: []
  
  # КОДОВЫЕ ГАЙДЛАЙНЫ — КЛЮЧЕВАЯ ФИЧА!
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/CODING_GUIDELINES.md"
      - "**/.cursorrules"
      - "**/.github/copilot-instructions.md"

# =============================================================================
# ИНСТРУМЕНТЫ ГЛУБОКОГО АНАЛИЗА
# =============================================================================
tools:
  # AST-GREP для поиска паттернов и уязвимостей
  ast-grep:
    essential_rules: true
    rule_dirs:
      - ".coderabbit/rules"
  
  # Статический анализ для разных языков (если есть в проекте)
  ruff:  # Python
    enabled: true
  markdownlint:  # Документация
    enabled: true

# =============================================================================
# ФИЛЬТРЫ — ЧТО ПРОВЕРЯТЬ
# =============================================================================
path_filters:
  # Включаем весь код
  - "**/*.cs"
  - "**/*.csproj"
  - "**/*.json"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.md"
  
  # Исключаем артефакты сборки и сторонние зависимости
  - "!**/bin/**"
  - "!**/obj/**"
  - "!**/node_modules/**"
  - "!**/.git/**"

# =============================================================================
# КОНТЕКСТНЫЕ ИНСТРУКЦИИ ПО ПУТЯМ — СЕРДЦЕ АРХИТЕКТУРНОГО РЕВЬЮ
# =============================================================================
path_instructions:
  # ГЛОБАЛЬНЫЕ ИНСТРУКЦИИ ДЛЯ ВСЕГО C# КОДА
  - path: "**/*.cs"
    instructions: |
      Проведи глубокий архитектурный анализ:
      
      1. МОДУЛЬНОСТЬ:
         - Проверь, не нарушаются ли границы между модулями (Booking, Inventory, Payment, Shared)
         - Модули не должны иметь прямых ссылок друг на друга — только через Shared или события
         - Если модуль напрямую вызывает код другого модуля — это архитектурная проблема
      
      2. ПАТТЕРНЫ ПРОЕКТИРОВАНИЯ:
         - Проверь корректность использования Saga для распределённых транзакций
         - Команды и подписчики должны быть разделены по модулям
         - Репозитории должны использовать Generic Repository Pattern при необходимости
      
      3. SOLID:
         - Классы не должны иметь более одной причины для изменения (Single Responsibility)
         - Зависимости должны быть через интерфейсы, а не конкретные реализации
         - Логика не должна дублироваться (DRY)
      
      4. УСТАРЕВШИЕ/ОПАСНЫЕ МЕТОДЫ:
         - Предупреди о любом использовании Thread.Sleep(), Task.Result, .GetAwaiter().GetResult()
         - Найди потенциальные deadlock'и в асинхронном коде
         - Проверь правильность using/dispose для IDisposable
      
      5. ПРОИЗВОДИТЕЛЬНОСТЬ:
         - Проверь LINQ-запросы на N+1 проблему
         - Укажи на места, где можно использовать AsNoTracking() для read-only запросов
         - Найди потенциальные утечки памяти (неотписанные события, статические коллекции)
      
      6. БЕЗОПАСНОСТЬ:
         - Проверь SQL-инъекции (использование интерполяции строк в запросах)
         - Найди места, где exception message возвращается клиенту
         - Проверь валидацию входных данных
  
  # МОДУЛЬ BOOKING
  - path: "BookingModule/**/*.cs"
    instructions: |
      Специфичные проверки для BookingModule:
      - Проверь корректность работы с Repository (SingleOrDefaultAsync вместо SingleAsync)
      - Убедись, что SagaState корректно обновляется и не теряет данные
      - Проверь, что все внешние вызовы идут через события (CAP), а не прямые зависимости
      - Обрати внимание на правильность обработки статусов бронирования
  
  # МОДУЛЬ INVENTORY
  - path: "InventoryModule/**/*.cs"
    instructions: |
      Специфичные проверки для InventoryModule:
      - Проверь резервирование номеров — нет ли race condition
      - Убедись, что при ошибке резервирования публикуется ReservationFailedEvent, а не пустой GUID
      - Проверь корректность работы с транзакциями (единица работы)
  
  # МОДУЛЬ PAYMENT
  - path: "PaymentModule/**/*.cs"
    instructions: |
      Специфичные проверки для PaymentModule:
      - Проверь, что в событии PaymentProcessed при успехе не передаётся ошибка (Error должен быть null)
      - Убедись, что при ошибке платежа публикуется корректное событие отката
      - Проверь обработку idempotency — повторные платежи не должны создавать дубликаты
  
  # SHARED МОДУЛЬ
  - path: "Shared/**/*.cs"
    instructions: |
      Shared должен содержать только общие интерфейсы, DTO и утилиты.
      - НЕ должно быть бизнес-логики в Shared
      - НЕ должно быть зависимостей на конкретные модули
      - Проверь, что классы в Shared действительно нужны в нескольких модулях
  
  # КОНФИГУРАЦИЯ
  - path: "**/appsettings*.json"
    instructions: |
      Это конфигурационные шаблоны:
      - Не помечай плейсхолдеры (localhost, yourserver, example.com) как проблемы безопасности
      - Реальные секреты должны быть в secrets.json или переменных окружения
      - Проверь, что строки подключения используют Trusted_Connection или переменные окружения
  
  # ПРОЕКТНЫЕ ФАЙЛЫ
  - path: "**/*.csproj"
    instructions: |
      Анализ зависимостей проекта:
      - Проверь, что нет устаревших пакетов (MediatR.Extensions.Microsoft.DependencyInjection)
      - Проверь, что все ProjectReference используют относительные пути, а не абсолютные
      - Убедись, что версии пакетов консистентны между модулями
      - Найди неиспользуемые пакеты

# =============================================================================
# АВТОМАТИЧЕСКОЕ РЕВЬЮ
# =============================================================================
auto_review:
  enabled: true
  auto_incremental_review: true
  drafts: false  # Пропускаем черновики, пока не готово к ревью
  ignore_title_keywords:
    - "wip"
    - "draft"
    - "do not merge"
  ignore_usernames:
    - "dependabot[bot]"
    - "renovate[bot]"

# =============================================================================
# ПРЕД-МЕРЖ ЧЕКИ
# =============================================================================
pre_merge_checks:
  title:
    mode: "warning"
    requirements: "PR title должен быть информативным и описывать суть изменений"
  description:
    mode: "warning"
  docstrings:
    mode: "warning"
    threshold: 80
  custom_checks:
    - name: "Breaking Changes"
      mode: "warning"
      instructions: |
        Проверь, не вносит ли этот PR breaking changes в API или поведение.
        Если да — укажи на необходимость документации и миграции.
    - name: "Module Boundaries"
      mode: "warning"
      instructions: |
        Проверь, не нарушены ли границы модулей. Модули не должны иметь прямых
        зависимостей друг на друга.
    - name: "Saga Consistency"
      mode: "warning"
      instructions: |
        Проверь, что все шаги саги корректно обрабатываются и при ошибках
        публикуются compensating events.
